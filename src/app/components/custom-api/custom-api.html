<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="Ingrese ciudad..." [(ngModel)]="ciudad">
        <button class="btn btn-primary" (click)="buscarClima()">Buscar</button>
      </div>

      @if (isLoading) {
        <div class="text-center"><div class="spinner-border"></div></div>
      }

      @if (weatherData) {
        <div class="card text-center shadow">
          <div class="card-body">
            <h3>{{ weatherData.city }}</h3>
            <img [src]="weatherData.icon" alt="icon">
            <h1 class="display-1">{{ weatherData.temp_c }}°C</h1>
            <p class="lead">{{ weatherData.condition }}</p>
            <p>Humedad: {{ weatherData.humidity }}% | Viento: {{ weatherData.wind_kph }} km/h</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
